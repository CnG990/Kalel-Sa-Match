# Configuration Nginx pour KalelSaMatch
# À placer dans /etc/nginx/sites-available/kalelsamatch

server {
    listen 80;
    server_name kalelsamatch.duckdns.org;
    
    # Redirection vers HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kalelsamatch.duckdns.org;
    
    # Configuration SSL
    ssl_certificate /etc/letsencrypt/live/kalelsamatch.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kalelsamatch.duckdns.org/privkey.pem;
    
    # Headers de sécurité
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Fichiers statiques
    location /static/ {
        alias /home/ec2-user/Kalel-Sa-Match/python-backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /media/ {
        alias /home/ec2-user/Kalel-Sa-Match/python-backend/media/;
        expires 1y;
        add_header Cache-Control "public";
    }
    
    # Application Django
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/api/core/health/;
        access_log off;
    }
    
    # Logs
    access_log /var/log/nginx/kalelsamatch_access.log;
    error_log /var/log/nginx/kalelsamatch_error.log;
}
